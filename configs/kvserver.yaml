# TinyKVServer Configuration
node:
  id: "node-1"
  host: "0.0.0.0"
  port: 9006
  data_dir: "./data/node-1"

store:
  engine: "memory"
  wal_enabled: true
  wal_file: "./data/node-1/kv.wal"
  snapshot_file: "./data/node-1/kv.snapshot"
  snapshot_threshold: 1000
  max_keys: 0

cluster:
  enabled: false
  peers: "node-1@127.0.0.1:9006"
  replication_factor: 2
  health_check_interval_ms: 1000
  consistency: "best_effort"
  leader_id: "node-1"

log:
  write_mode: "async"
  file: "./KVServerLog"
  buffer_size: 8192
  split_lines: 5000000
  max_queue_size: 800
  close: false
