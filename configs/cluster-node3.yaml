# Five-node cluster test configuration
node:
  id: "node-3"
  host: "0.0.0.0"
  port: 19023
  data_dir: "./data/node-3"

store:
  engine: "memory"
  wal_enabled: true
  wal_file: "./data/node-3/kv.wal"
  snapshot_file: "./data/node-3/kv.snapshot"
  snapshot_threshold: 1000
  max_keys: 0

cluster:
  enabled: true
  peers: "node-1@127.0.0.1:19021,node-2@127.0.0.1:19022,node-3@127.0.0.1:19023,node-4@127.0.0.1:19024,node-5@127.0.0.1:19025"
  replication_factor: 2
  health_check_interval_ms: 1000
  consistency: "raft"
  leader_id: "node-1"

log:
  write_mode: "async"
  file: "./KVServerLog"
  buffer_size: 8192
  split_lines: 5000000
  max_queue_size: 800
  close: false
