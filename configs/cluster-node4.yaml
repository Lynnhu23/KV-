# Five-node cluster test configuration
node:
  id: "node-4"
  host: "0.0.0.0"
  port: 19024
  data_dir: "./data/node-4"

store:
  engine: "memory"
  wal_enabled: true
  wal_file: "./data/node-4/kv.wal"
  snapshot_file: "./data/node-4/kv.snapshot"
  snapshot_threshold: 1000

cluster:
  enabled: true
  peers: "node-1@127.0.0.1:19021,node-2@127.0.0.1:19022,node-3@127.0.0.1:19023,node-4@127.0.0.1:19024,node-5@127.0.0.1:19025"

log:
  write_mode: "async"
  file: "./KVServerLog"
  buffer_size: 8192
  split_lines: 5000000
  max_queue_size: 800
  close: false
